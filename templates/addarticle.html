{% extends "layout.html" %}

{% block body %}
{% load crispy_forms_tags %}

<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="content-section">
            <h3><i class="fas fa-edit"></i> Makale Oluştur</h3>
            <hr>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{form.media}}
                
                {{ form|crispy }}
                <br>
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-plus-circle"></i> Makale Ekle
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock body %}
