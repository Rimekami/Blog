{% extends "layout.html" %}

{% block title %}Kayıt Ol{% endblock title %}

{% block body %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h3 class="text-center mb-0">Kayıt Ol</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username"><i class="fas fa-user text-muted mr-2"></i>Kullanıcı Adı</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Kullanıcı adınızı giriniz" required>
                    </div>
                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock text-muted mr-2"></i>Şifre</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Şifrenizi giriniz" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm"><i class="fas fa-check-circle text-muted mr-2"></i>Şifre Doğrulama</label>
                        <input type="password" name="confirm" id="confirm" class="form-control" placeholder="Şifrenizi tekrar giriniz" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-user-plus mr-2"></i>Kayıt Ol
                    </button>
                </form>
            </div>
            <div class="card-footer bg-white text-center">
                <p class="mb-0">Zaten bir hesabınız var mı? <a href="/login" class="font-weight-bold text-primary">Giriş Yap</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
